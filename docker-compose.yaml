services:
  postgres:
    image: postgres:16.4-alpine
    container_name: database
    ports:
      - "5456:5456"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      dockerfile: dockerfile
    ports:
      - "5457:5457"
    volumes:
      -tdfd:

volumes:
  postgres_data: